# Greenpack Pro — Docker Compose (Mode B: Cloud/LAN Deployment)
# Usage: docker compose up -d
# Access: http://localhost or https://yourdomain.com

version: '3.9'

services:

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: greenpack-api
    restart: unless-stopped
    environment:
      GREENPACK_MODE: server
      DB_URL: postgresql+asyncpg://greenpack:${POSTGRES_PASSWORD}@postgres:5432/greenpackpro
      REDIS_URL: redis://redis:6379/0
      STORAGE_TYPE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: greenpackpro
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      API_HOST: 0.0.0.0
      API_PORT: 18080
      ALLOWED_ORIGINS: "http://localhost,https://${DOMAIN:-localhost}"
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-false}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      LOG_LEVEL: INFO
    volumes:
      - reports_data:/app/reports
      - models_data:/app/models
      - logs_data:/app/logs
    networks:
      - greenpack
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: greenpack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: greenpackpro
      POSTGRES_USER: greenpack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - greenpack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenpack -d greenpackpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Job Queue for Celery) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: greenpack-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - greenpack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MinIO Object Storage ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: greenpack-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - greenpack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: greenpack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - reports_data:/var/www/reports:ro
    networks:
      - greenpack
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  reports_data:
  models_data:
  logs_data:

networks:
  greenpack:
    driver: bridge
